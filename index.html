<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a2238">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meca">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Constructeur de Route</title>
<style>
  :root{
    --bg:#1a2238; --panel:#222c4a; --grid:#2c3a5e; --gridline:#3a4a72;
    --road:#3d3d42; --roadline:#f4d35e; --accent:#ee6c4d; --green:#43aa8b;
    --txt:#e6ebf5; --muted:#9aa6c4;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    background:
      radial-gradient(circle at 20% 5%, #2a3458 0%, transparent 45%),
      radial-gradient(circle at 90% 95%, #1e2a4a 0%, transparent 45%),
      var(--bg);
    color:var(--txt);
    display:flex;flex-direction:column;align-items:center;
    padding:8px 8px 14px;gap:8px;
    overflow:hidden;
  }
  h1{
    font-size:18px;letter-spacing:.5px;text-align:center;
    text-shadow:0 2px 0 rgba(0,0,0,.3);
  }
  h1 .car{display:inline-block;animation:bob 2s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-4px) rotate(-4deg)}}

  .board-wrap{
    background:var(--panel);padding:6px;border-radius:14px;
    box-shadow:0 8px 22px rgba(0,0,0,.4);
  }
  #board{
    display:grid;background:var(--grid);
    border-radius:8px;overflow:hidden;gap:1px;padding:1px;
    position:relative;
  }
  .cell{
    width:var(--ts);height:var(--ts);
    background:var(--gridline);position:relative;cursor:pointer;
  }
  .cell:active{filter:brightness(1.3)}
  .cell svg{width:100%;height:100%;display:block}
  .cell.start,.cell.end{outline:2px solid;outline-offset:-2px;border-radius:3px}
  .badge{
    position:absolute;top:1px;left:1px;font-size:9px;font-weight:bold;
    background:rgba(0,0,0,.55);padding:0 3px;border-radius:3px;z-index:5;
    pointer-events:none;
  }

  .arrow{
    position:absolute;width:calc(var(--ts) * .42);height:calc(var(--ts) * .42);
    z-index:10;background:var(--roadline);border:2px solid #1a1a1a;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--ts) * .26);color:#1a1a1a;cursor:pointer;
    box-shadow:0 2px 4px rgba(0,0,0,.5);
  }
  .arrow:active{transform:scale(1.25)}

  .car-sprite{
    position:absolute;width:var(--ts);height:var(--ts);top:1px;left:1px;
    z-index:20;pointer-events:none;display:flex;align-items:center;justify-content:center;
    transition:transform .32s linear;
  }
  .car-sprite .body{font-size:calc(var(--ts) * .6);filter:drop-shadow(0 2px 2px rgba(0,0,0,.5));transition:transform .3s ease;display:inline-block}
  /* explosion de collision */
  .boom{
    position:absolute;width:var(--ts);height:var(--ts);z-index:30;pointer-events:none;
    display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--ts) * .9);
    animation:boom .7s ease-out forwards;
  }
  @keyframes boom{
    0%{transform:scale(.2) rotate(0deg);opacity:0}
    30%{transform:scale(1.4) rotate(15deg);opacity:1}
    100%{transform:scale(1.8) rotate(-10deg);opacity:0}
  }
  .car-sprite.crashed .body{animation:shake .3s ease-in-out 3}
  @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-18deg)}75%{transform:rotate(18deg)}}
  /* débris persistants après explosion */
  .debris{
    position:absolute;width:var(--ts);height:var(--ts);z-index:25;pointer-events:none;
    display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--ts) * .55);opacity:.85;
    animation:debris-in .4s ease-out;
  }
  @keyframes debris-in{0%{opacity:0;transform:scale(0)}100%{opacity:.85;transform:scale(1)}}
  /* grosse explosion (collision) */
  .boom.big{font-size:calc(var(--ts) * 1.4);animation:boom 1s ease-out forwards}
  /* fond rouge clignotant : cul-de-sac */
  .cell.deadend-flash{animation:deadend 0.6s ease-in-out infinite}
  @keyframes deadend{
    0%,100%{background:var(--gridline)}
    50%{background:#c83a3a}
  }


  /* controls */
  .controls{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px}
  .palette{display:grid;grid-template-columns:repeat(6,1fr);gap:3px}
  .ptile{
    height:56px;background:var(--panel);border-radius:8px;cursor:pointer;
    border:2px solid transparent;padding:2px 2px 0;display:flex;flex-direction:column;
  }
  .ptile.active{border-color:var(--roadline);box-shadow:0 0 0 2px var(--roadline)}
  .ptile svg{width:100%;flex:1;min-height:0}
  .pt-label{font-size:7px;text-align:center;color:var(--muted);padding:1px 0;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .tools{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .tools button{font-size:11px;padding:9px 2px}
  /* Modale Circuits */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
    display:none;align-items:center;justify-content:center;padding:16px}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border-radius:14px;padding:16px;max-width:340px;width:100%;
    max-height:85vh;display:flex;flex-direction:column;gap:10px;
    box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .modal h3{font-size:16px}
  .modal .close-x{position:absolute;background:none;font-size:20px;padding:4px 8px}
  .modal-header{display:flex;justify-content:space-between;align-items:center}
  .save-row{display:flex;gap:6px}
  .save-row input{flex:1;background:var(--grid);color:var(--txt);border:none;
    border-radius:8px;padding:9px;font-family:inherit;font-size:13px}
  .save-row button{background:var(--green);font-size:12px;padding:9px 12px}
  .saves-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;
    background:var(--bg);border-radius:8px;padding:6px;min-height:120px}
  .save-item{display:flex;align-items:center;gap:6px;background:var(--grid);
    border-radius:8px;padding:8px 10px}
  .save-item .name{flex:1;font-size:13px;font-weight:bold;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .save-item .date{font-size:9px;color:var(--muted)}
  .save-item button{font-size:11px;padding:6px 8px}
  .load-btn{background:var(--roadline);color:#1a1a1a}
  .del-btn{background:var(--accent)}
  .saves-empty{text-align:center;color:var(--muted);font-size:12px;padding:20px 0}
  .diff{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .diff-label{font-size:11px;color:var(--muted);font-weight:bold}
  .diff-btn{flex:1;padding:8px 4px;font-size:12px;background:var(--grid)}
  .diff-btn.active{background:var(--roadline);color:#1a1a1a}
  button{
    font-family:inherit;font-weight:bold;font-size:12px;cursor:pointer;
    border:none;border-radius:10px;padding:11px 4px;color:#fff;
    background:var(--grid);
  }
  button:active{transform:scale(.95)}
  .btn-go{background:var(--green);grid-column:1/-1;font-size:15px;padding:13px}
  .play-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:6px}
  .play-row .btn-go{grid-column:auto}
  .btn-pause{background:var(--accent);font-size:13px}
  .btn-stop{background:#6c7a96;font-size:13px}
  .btn-pause:disabled,.btn-stop:disabled{opacity:.4}
  .speed{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .speed-label{font-size:11px;color:var(--muted);font-weight:bold}
  .speed-btn{flex:1;padding:8px 4px;font-size:12px;background:var(--grid)}
  .speed-btn.active{background:var(--roadline);color:#1a1a1a}
  #msg{text-align:center;font-size:13px;font-weight:bold;min-height:18px}
  .win{color:#7ef0d2}
  .fail{color:#ffb59e}
  .hint{font-size:10px;color:var(--muted);text-align:center;line-height:1.4}
  .hint b{color:var(--roadline)}
</style>
</head>
<body>
  <h1>Constructeur de Route <span class="car">🚗</span></h1>

  <div class="board-wrap">
    <div id="board"></div>
  </div>

  <div class="controls">
    <div class="palette" id="palette"></div>
    <div class="diff" id="diff">
      <span class="diff-label">Difficulté :</span>
      <button class="diff-btn active" data-lvl="easy">Facile</button>
      <button class="diff-btn" data-lvl="medium">Moyen</button>
      <button class="diff-btn" data-lvl="hard">Difficile</button>
    </div>
    <div class="tools">
      <button id="generate">🎲 Générer</button>
      <button id="erase">🧽 Gomme</button>
      <button id="clear">🗑️ Effacer</button>
      <button id="save">💾 Circuits</button>
    </div>
    <div class="play-row">
      <button id="go" class="btn-go">▶ Lancer</button>
      <button id="pause" class="btn-pause" disabled>⏸ Pause</button>
      <button id="stop" class="btn-stop" disabled>⏹ Stop</button>
    </div>
    <div class="speed" id="speed">
      <span class="speed-label">Vitesse :</span>
      <button class="speed-btn" data-mult="2">🐢 Lent</button>
      <button class="speed-btn active" data-mult="1">Normal</button>
      <button class="speed-btn" data-mult="0.5">🐇 Rapide</button>
    </div>
    <div id="msg"></div>
    <p class="hint">🚗 <b>verte</b> A1→B1 &nbsp;•&nbsp; 🚙 <b>bleue</b> A2→B2 &nbsp;— réseau partagé. <b>Touche</b> : poser • <b>Re-touche</b> : pivoter • <b>Appui long</b> : ordre des sorties. <b>Générer</b> crée 2 parcours. Évite les collisions 💥&nbsp;!</p>
  </div>

  <!-- Modale Circuits -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3>💾 Mes circuits</h3>
        <button class="close-x" id="modal-close">✕</button>
      </div>
      <div class="save-row">
        <input type="text" id="save-name" placeholder="Nom du circuit…" maxlength="30">
        <button id="save-btn">Enregistrer</button>
      </div>
      <div class="saves-list" id="saves-list"></div>
    </div>
  </div>

<script>
(function(){
  const COLS=10, ROWS=10;
  const board=document.getElementById('board');

  // adaptive tile size: fit board width to screen (portrait), capped
  function setTileSize(){
    const avail=Math.min(window.innerWidth-16, 420);
    const ts=Math.floor((avail-2-(COLS-1)) / COLS); // minus padding+gaps
    document.documentElement.style.setProperty('--ts', ts+'px');
    return ts;
  }
  let TS=setTileSize();
  board.style.gridTemplateColumns=`repeat(${COLS},var(--ts))`;

  const TYPES={
    straight:{name:'Droite', open:[0,2]},
    turn:    {name:'Virage', open:[1,2]},
    tee:     {name:'T-D', open:[1,2,3]},  // courbe vers l'Est
    tee_l:   {name:'T-G', open:[1,2,3]},  // miroir : courbe vers l'Ouest
    cross:   {name:'Croisem.', open:[0,1,2,3]},
    loop:    {name:'Boucle', open:[2]}
  };
  // Plus de tuiles à choix multiple : T et X sont désormais déterministes.
  const MULTI={};
  // Tuiles « demi-tour » : entrée = sortie
  const LOOP={loop:1};

  // Table de routage. Pour le T, l'entrée par E donne une ALTERNANCE entre deux sorties.
  // Format : valeur unique = sortie déterministe ; tableau = liste de sorties à alterner.
  const ROUTE={
    // X : on continue toujours tout droit
    cross:{0:2, 1:3, 2:0, 3:1},
    // T droite (base : barre E-O + courbe S->E)
    // - E : alterne entre O (tout droit) et S (courbe)
    // - O : déterministe -> E
    // - S : déterministe -> E (courbe)
    tee:{1:[3,2], 3:1, 2:1},
    // T gauche (miroir : barre E-O + courbe S->O)
    // - O : alterne entre E (tout droit) et S (courbe)
    // - E : déterministe -> O
    // - S : déterministe -> O (courbe)
    tee_l:{3:[1,2], 1:3, 2:3}
  };

  // Retourne l'ordre courant des sorties d'alternance pour un T (selon swap).
  // Renvoie aussi le relIn (côté d'entrée concerné par l'alternance) pour ce type.
  function teeAlternance(cell){
    const relIn = cell.type==='tee' ? 1 : 3;          // E pour tee, O pour tee_l
    const base  = ROUTE[cell.type][relIn];            // [3,2] ou [1,2]
    const ord   = cell.swap ? [base[1], base[0]] : base;
    return {relIn, ordered:ord};
  }

  let selectedType='straight', eraseMode=false, running=false;
  let speedMult=1;        // multiplicateur de délai (2=lent, 1=normal, 0.5=rapide)
  let paused=false;       // état pause pendant la course
  let resumeFn=null;      // fonction à rappeler pour reprendre après pause
  let raceToken=0;        // jeton incrémenté à chaque course ; permet d'annuler proprement
  const lastRot={};  // dernière orientation posée par type de tuile
  let longFired=false;  // évite que l'appui long déclenche aussi le clic
  // cell = {type, rot, order} ; order = permutation des côtés ouverts (priorité de sortie)
  const grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  // Deux voitures : chacune son départ/arrivée, sur un réseau de routes partagé.
  const CARS=[
    {id:0, name:'Verte', color:'#43aa8b', emoji:'🚗',
     start:{r:ROWS-1,c:0}, end:{r:0,c:COLS-1}},
    {id:1, name:'Bleue', color:'#4d8cee', emoji:'🚙',
     start:{r:0,c:0}, end:{r:ROWS-1,c:COLS-1}}
  ];

  const rot=(d,t)=>(d+t)%4;
  const openDirs=cell=>cell?TYPES[cell.type].open.map(d=>rot(d,cell.rot)):[];

  // Permutations d'un tableau (pour cycler l'ordre des sorties)
  function permutations(arr){
    if(arr.length<=1)return [arr.slice()];
    const res=[];
    arr.forEach((v,i)=>{
      const rest=arr.slice(0,i).concat(arr.slice(i+1));
      permutations(rest).forEach(p=>res.push([v,...p]));
    });
    return res;
  }
  // ordre par défaut = côtés ouverts (absolus) triés ; order = index dans la liste des permutations
  function orderedExits(cell){
    const open=openDirs(cell);
    if(open.length<=2) return open;            // pas d'ambiguïté
    const perms=permutations(open.slice().sort((a,b)=>a-b));
    return perms[(cell.order||0)%perms.length];
  }
  function nbOrders(cell){
    const open=openDirs(cell);
    if(open.length<=2) return 1;
    let f=1;for(let i=2;i<=open.length;i++)f*=i;return f; // factorielle
  }

  function tileSVG(type,r,order){
    const road='var(--road)', line='var(--roadline)', c=5;
    const open=TYPES[type].open.map(d=>rot(d,r));
    const seg=d=>({
      0:`<rect x="3" y="0" width="4" height="5" fill="${road}"/>`,
      2:`<rect x="3" y="5" width="4" height="5" fill="${road}"/>`,
      1:`<rect x="5" y="3" width="5" height="4" fill="${road}"/>`,
      3:`<rect x="0" y="3" width="5" height="4" fill="${road}"/>`
    }[d]);
    const dash=d=>({
      0:`<line x1="5" y1="0" x2="5" y2="5" stroke="${line}" stroke-width=".4" stroke-dasharray="1 1"/>`,
      2:`<line x1="5" y1="5" x2="5" y2="10" stroke="${line}" stroke-width=".4" stroke-dasharray="1 1"/>`,
      1:`<line x1="5" y1="5" x2="10" y2="5" stroke="${line}" stroke-width=".4" stroke-dasharray="1 1"/>`,
      3:`<line x1="0" y1="5" x2="5" y2="5" stroke="${line}" stroke-width=".4" stroke-dasharray="1 1"/>`
    }[d]);
    let s='';
    // Cas spécial T (droite et gauche) : rendu organique avec barre droite + courbe
    if(type==='tee' || type==='tee_l'){
      const angle=r*90;
      // Pour tee_l (miroir), on applique un scaleX(-1) autour du centre
      const mirror = (type==='tee_l') ? ' scale(-1 1) translate(-10 0)' : '';
      s+=`<g transform="rotate(${angle} 5 5)${mirror}">`;
      // barre E-O complète
      s+=`<rect x="0" y="3" width="10" height="4" fill="${road}"/>`;
      // branche courbe S -> E
      s+=`<path d="M3 10 Q3 5 7 5" fill="none" stroke="${road}" stroke-width="4" stroke-linecap="butt"/>`;
      // pointillés guide
      s+=`<line x1="0" y1="5" x2="10" y2="5" stroke="${line}" stroke-width=".4" stroke-dasharray="1 1"/>`;
      s+=`<path d="M5 10 Q5 5 9 5" fill="none" stroke="${line}" stroke-width=".4" stroke-dasharray="1 1"/>`;
      s+=`</g>`;
    }else{
      open.forEach(d=>s+=seg(d));
      s+=`<rect x="3" y="3" width="4" height="4" fill="${road}"/>`;
      open.forEach(d=>s+=dash(d));
    }
    // tuile boucle : un anneau au centre qui renvoie la voiture
    if(LOOP[type]){
      // anneau de route (couronne) centré, par-dessus le segment d'entrée
      s+=`<circle cx="5" cy="5" r="2.6" fill="none" stroke="${road}" stroke-width="1.6"/>`;
      s+=`<circle cx="5" cy="5" r="2.6" fill="none" stroke="${line}" stroke-width=".35" stroke-dasharray="1 1"/>`;
      // petite flèche de demi-tour
      s+=`<path d="M5.9 3.1 a2.1 2.1 0 1 1 -1.8 0" fill="none" stroke="#ffd95e" stroke-width=".45"/>`;
    }
    // numéros sur les sorties d'alternance (T) — order = {relIn, ordered: [relDir1, relDir2]}
    if(order && order.ordered){
      // positions absolues (après application de la rotation r)
      const pos={0:{x:5,y:1.6},1:{x:8.4,y:5.3},2:{x:5,y:8.8},3:{x:1.6,y:5.3}};
      order.ordered.forEach((relD,i)=>{
        const absD=(relD + r) % 4;
        const p=pos[absD];
        s+=`<circle cx="${p.x}" cy="${p.y-0.9}" r="1.5" fill="#1a1a1a"/>`;
        s+=`<text x="${p.x}" y="${p.y}" font-size="2" fill="#f4d35e" text-anchor="middle" font-family="sans-serif" font-weight="bold">${i+1}</text>`;
      });
    }
    return `<svg viewBox="0 0 10 10">${s}</svg>`;
  }

  const palette=document.getElementById('palette');
  Object.keys(TYPES).forEach(t=>{
    const d=document.createElement('div');
    d.className='ptile'+(t===selectedType?' active':'');
    d.innerHTML=tileSVG(t,0,null)+`<div class="pt-label">${TYPES[t].name}</div>`;
    d.onclick=()=>{selectedType=t;eraseMode=false;eraseBtn.style.outline='';
      document.querySelectorAll('.ptile').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');};
    palette.appendChild(d);
  });

  // repère un point (start/end) -> {carIndex, kind} pour le marquage
  function markerAt(r,c){
    for(const car of CARS){
      if(car.start.r===r&&car.start.c===c) return {car, kind:'A'};
      if(car.end.r===r&&car.end.c===c) return {car, kind:'B'};
    }
    return null;
  }

  const cells=[];
  for(let r=0;r<ROWS;r++){cells[r]=[];for(let c=0;c<COLS;c++){
    const el=document.createElement('div');el.className='cell';
    const mk=markerAt(r,c);
    if(mk){
      el.classList.add(mk.kind==='A'?'start':'end');
      el.style.outlineColor=mk.car.color;
      el.innerHTML=`<span class="badge" style="color:${mk.car.color}">${mk.kind}${mk.car.id+1}</span>`;
    }
    // Appui long tactile détecté par timer (contexte tactile valide -> vibration autorisée).
    // contextmenu sert uniquement à la souris (clic droit desktop).
    let suppressClick=false, lpTimer=null, longDone=false;
    el.addEventListener('touchstart',()=>{
      if(running)return;
      longDone=false;
      lpTimer=setTimeout(()=>{
        lpTimer=null; longDone=true; suppressClick=true;
        if(navigator.vibrate)navigator.vibrate(30);   // vibration dans le geste tactile
        altAction(r,c);
      },450);
    },{passive:true});
    const cancelLP=()=>{ if(lpTimer){clearTimeout(lpTimer);lpTimer=null;} };
    el.addEventListener('touchend',cancelLP);
    el.addEventListener('touchmove',cancelLP);
    el.addEventListener('touchcancel',cancelLP);
    el.oncontextmenu=e=>{
      e.preventDefault();
      // souris uniquement : si l'appui long tactile a déjà agi, on ne refait rien.
      // Si contextmenu arrive avant le timer, on annule le timer pour éviter le double-swap.
      if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}
      if(!running && !longDone){
        longDone=true; suppressClick=true;
        altAction(r,c);
      }
    };
    el.onclick=(e)=>{
      if(suppressClick){suppressClick=false;e.preventDefault();return;}
      if(!running)cellClick(r,c);
    };
    board.appendChild(el);cells[r][c]=el;
  }}
  // un élément voiture par CAR
  const carEls=CARS.map(car=>{
    const d=document.createElement('div');
    d.className='car-sprite';d.style.display='none';
    d.innerHTML=`<span class="body">${car.emoji}</span>`;
    board.appendChild(d);
    return d;
  });

  function cellClick(r,c){
    if(eraseMode){grid[r][c]=null;draw();autosave();return;}
    const cur=grid[r][c];
    if(cur && cur.type===selectedType){
      // re-touche = pivoter (pour toutes les tuiles)
      cur.rot=(cur.rot+1)%4;
      cur.order=0;
      if(!MULTI[cur.type]) lastRot[cur.type]=cur.rot;
    }else{
      // pose : reprend la dernière orientation utilisée pour ce type
      grid[r][c]={type:selectedType,rot:(lastRot[selectedType]||0),order:0};
    }
    draw();autosave();
  }
  // clic droit / appui long : sur T et X, change l'ordre des sorties ; sinon pivote
  function altAction(r,c){
    const cur=grid[r][c];if(!cur)return;
    if(cur.type==='tee'||cur.type==='tee_l'){
      // appui long sur un T : inverse l'ordre de l'alternance (1 ↔ 2)
      cur.swap=!cur.swap;
    }else{
      cur.rot=(cur.rot+1)%4;lastRot[cur.type]=cur.rot;
    }
    draw();autosave();
  }

  function draw(){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const el=cells[r][c],cell=grid[r][c],badge=el.querySelector('.badge');
      el.innerHTML='';if(badge)el.appendChild(badge);
      if(cell){
        // pour le T (droite/gauche), on affiche par défaut les numéros sur les 2 sorties d'alternance
        let ord=null;
        if(cell.type==='tee'||cell.type==='tee_l'){
          ord=teeAlternance(cell);
        }
        el.insertAdjacentHTML('afterbegin',tileSVG(cell.type,cell.rot,ord));
      }
    }
  }
  // Redessine la tuile T avec les numéros sur les sorties de l'entrée `relIn` (alternance).
  // ptr = prochain index actif dans la liste des sorties alternantes.
  function redrawTeeWithPointer(r,c,relIn,ptr){
    const cell=grid[r][c];if(!cell||(cell.type!=='tee'&&cell.type!=='tee_l'))return;
    const raw=ROUTE[cell.type][relIn];
    if(!Array.isArray(raw))return;
    // applique swap : ordre de base inversé si la tuile a été basculée
    const spec = cell.swap ? [raw[1], raw[0]] : raw;
    const n=spec.length;
    const ordered=spec.map((_,i)=>spec[(ptr+i)%n]); // prochaine = 1, autre = 2
    const el=cells[r][c],badge=el.querySelector('.badge');
    el.innerHTML='';if(badge)el.appendChild(badge);
    el.insertAdjacentHTML('afterbegin',tileSVG(cell.type,cell.rot,{relIn, ordered}));
  }
  draw();

  // ============== SYSTÈME DE SAUVEGARDE ==============
  // Format compact : chaque case = "type:rot:swap" séparés par "|".
  const TYPE_CODE={straight:'s',turn:'t',tee:'T',tee_l:'L',cross:'x',loop:'o'};
  const CODE_TYPE=Object.fromEntries(Object.entries(TYPE_CODE).map(([k,v])=>[v,k]));
  function serializeGrid(){
    const cells=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const g=grid[r][c];
      if(!g) cells.push('');
      else cells.push(TYPE_CODE[g.type]+g.rot+(g.swap?'s':''));
    }
    return cells.join('|');
  }
  function deserializeGrid(str){
    if(!str || typeof str!=='string')return false;
    const parts=str.split('|');
    if(parts.length!==ROWS*COLS)return false;
    const newGrid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    for(let i=0;i<parts.length;i++){
      const p=parts[i]; if(!p)continue;
      const type=CODE_TYPE[p[0]]; if(!type)continue;
      const rot=parseInt(p[1],10); if(isNaN(rot))continue;
      const swap=p.length>2 && p[2]==='s';
      const r=Math.floor(i/COLS), c=i%COLS;
      newGrid[r][c]={type,rot,order:0,swap};
    }
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)grid[r][c]=newGrid[r][c];
    return true;
  }

  const AUTOSAVE_KEY='meca-autosave';
  const SAVES_KEY='meca-saves';
  let autosaveTimer=null;
  function autosave(){
    if(autosaveTimer)clearTimeout(autosaveTimer);
    autosaveTimer=setTimeout(()=>{
      try{localStorage.setItem(AUTOSAVE_KEY,serializeGrid());}catch(e){}
    },300);
  }
  function loadAutosave(){

      const s=localStorage.getItem(AUTOSAVE_KEY);
      if(s && deserializeGrid(s)){draw();}
    }catch(e){}
  }

    catch(e){return [];}

  function saveCircuit(name){

  loadAutosave();

  const eraseBtn=document.getElementById('erase');

  // ---- Sélecteur de difficulté ----
  let difficulty='easy';
  document.querySelectorAll('.diff-btn').forEach(b=>{
    b.onclick=()=>{
      if(running)return;
      difficulty=b.dataset.lvl;
      document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');

  });

  // Dérive {type,rot} dont les ouvertures == dirs. Priorité aux tuiles NON directionnelles
  // (straight, turn, cross) ; le T dirigé n'est utilisé qu'en dernier recours (3 ouvertures).
  function tileFromDirs(dirs){
    const set=[...new Set(dirs)].sort((a,b)=>a-b);
    for(const type of ['straight','turn','cross','loop']){
      for(let rt=0;rt<4;rt++){
        const open=TYPES[type].open.map(d=>(d+rt)%4).sort((a,b)=>a-b);
        if(open.length===set.length && open.every((v,i)=>v===set[i]))
          return {type,rot:rt,order:0};
      }
    }
    for(const type of ['tee','tee_l']){
      for(let rt=0;rt<4;rt++){
        const open=TYPES[type].open.map(d=>(d+rt)%4).sort((a,b)=>a-b);
        if(open.length===set.length && open.every((v,i)=>v===set[i]))
          return {type,rot:rt,order:0};
      }
    }
    return null;
  }

  // Simule le trajet d'une voiture sur une grille candidate (sans animation).
  // Retourne true si la voiture atteint son arrivée, false sinon (cul-de-sac/boucle/erreur).
  function simulateCar(g, car){
    let r=car.start.r,c=car.start.c,back=-1,steps=0;const xptr={};
    while(steps++<400){
      const cell=g[r][c];if(!cell)return false;
      if(r===car.end.r&&c===car.end.c)return true;
      const reach=d=>{const nr=r+DR[d],nc=c+DC[d];
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return false;
        const nx=g[nr][nc];return !!nx&&openDirs(nx).includes(OPP[d]);};
      if(LOOP[cell.type]){
        const ex=openDirs(cell)[0];
        if(back!==ex&&back!==-1)return false;
        if(!reach(ex))return false;
        r+=DR[ex];c+=DC[ex];back=OPP[ex];continue;
      }
      let d;
      if(ROUTE[cell.type]&&back!==-1){
        const ri=(back-cell.rot+4)%4;const spec=ROUTE[cell.type][ri];
        if(spec===undefined)return false;
        if(Array.isArray(spec)){const k=r+','+c+'/'+ri;const p=(xptr[k]||0)%spec.length;
          d=(spec[p]+cell.rot)%4;xptr[k]=p+1;}
        else d=(spec+cell.rot)%4;
        if(!reach(d))return false;
      }else{
        const u=openDirs(cell).filter(x=>x!==back&&reach(x));
        if(!u.length)return false;d=u[0];
      }
      r+=DR[d];c+=DC[d];back=OPP[d];
    }
    return false;
  }
  function gridFromDirs(dbc){
    const g=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    for(const k in dbc){const[r,c]=k.split(',').map(Number);
      let dirs=[...dbc[k]];if(dirs.length===1)dirs.push((dirs[0]+2)%4);
      const t=tileFromDirs(dirs);if(t)g[r][c]=t;}
    return g;
  }

  // marche aléatoire de start à end sur la grille, renvoie une liste de cases
  function randomPath(start,end,sinuosity){
    const visited=new Set();
    const key=(r,c)=>r+','+c;
    let path=[{r:start.r,c:start.c}];
    visited.add(key(start.r,start.c));
    let cur={r:start.r,c:start.c}, guard=0;
    while((cur.r!==end.r||cur.c!==end.c) && guard++<400){
      // directions possibles
      const opts=[];
      [[-1,0,0],[1,0,2],[0,1,1],[0,-1,3]].forEach(([dr,dc])=>{
        const nr=cur.r+dr, nc=cur.c+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return;
        if(visited.has(key(nr,nc)))return;
        opts.push({r:nr,c:nc});
      });
      if(!opts.length)break; // coincé -> on recommencera
      // score : se rapprocher de l'arrivée, avec un peu d'aléa selon sinuosité
      opts.forEach(o=>{
        const dist=Math.abs(o.r-end.r)+Math.abs(o.c-end.c);
        o.score=dist - Math.random()*sinuosity;
      });
      opts.sort((a,b)=>a.score-b.score);
      cur={r:opts[0].r,c:opts[0].c};
      visited.add(key(cur.r,cur.c));
      path.push(cur);
    }
    if(cur.r!==end.r||cur.c!==end.c)return null;
    return path;
  }
  function buildPath(start,end,sinuosity){
    for(let i=0;i<60;i++){const p=randomPath(start,end,sinuosity);if(p)return p;}
    return null;
  }

  function generate(retry){
    if(running)return;
    retry=retry||0;
    const cfg={
      easy:  {sinuosity:1.2, branches:0},
      medium:{sinuosity:3,   branches:6},
      hard:  {sinuosity:6,   branches:16}
    }[difficulty];
    const key=(r,c)=>r+','+c;

    // Plusieurs tentatives : on ne garde qu'un circuit où les 2 voitures ARRIVENT.
    for(let attempt=0; attempt<40; attempt++){
      const p1=buildPath(CARS[0].start,CARS[0].end,cfg.sinuosity);
      const p2=buildPath(CARS[1].start,CARS[1].end,cfg.sinuosity);
      if(!p1||!p2) continue;

      const dbc={};
      const link=(r,c,d)=>{const k=key(r,c);if(!dbc[k])dbc[k]=new Set();dbc[k].add(d);};
      const addPath=path=>{for(let i=0;i<path.length;i++){const {r,c}=path[i];
        if(i>0)link(r,c,dirTo(r,c,path[i-1].r,path[i-1].c));
        if(i<path.length-1)link(r,c,dirTo(r,c,path[i+1].r,path[i+1].c));}};
      addPath(p1);addPath(p2);

      const prot=new Set();
      CARS.forEach(c=>{prot.add(key(c.start.r,c.start.c));prot.add(key(c.end.r,c.end.c));});

      // le circuit de base (2 chemins) doit déjà être jouable
      let g=gridFromDirs(dbc);
      if(!simulateCar(g,CARS[0])||!simulateCar(g,CARS[1])) continue;

      // ajout incrémental d'intersections, validé par simulation à chaque étape
      const MOVE={0:[-1,0],1:[0,1],2:[1,0],3:[0,-1]};
      const isOcc=(r,c)=>!!dbc[key(r,c)];
      const canOpen=(r,c)=>{if(prot.has(key(r,c)))return false;const e=dbc[key(r,c)];return !e||e.size<4;};
      function findConn(sr,sc){
        const sk=key(sr,sc);const q=[{r:sr,c:sc,path:[[sr,sc]]}];const seen=new Set([sk]);let st=0;
        while(q.length&&st++<200){const cur=q.shift();const ord=[0,1,2,3].sort(()=>Math.random()-0.5);
          for(const d of ord){const nr=cur.r+MOVE[d][0],nc=cur.c+MOVE[d][1];
            if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;const nk=key(nr,nc);if(seen.has(nk))continue;
            if(isOcc(nr,nc)){if(nk!==sk&&cur.path.length>=2&&canOpen(nr,nc))return[...cur.path,[nr,nc]];continue;}
            if(cur.path.length<=4){seen.add(nk);q.push({r:nr,c:nc,path:[...cur.path,[nr,nc]]});}}}
        return null;
      }
      let added=0,att=0;
      while(added<cfg.branches && att++<cfg.branches*20){
        const occ=Object.keys(dbc).filter(k=>canOpen(...k.split(',').map(Number)));
        if(!occ.length)break;
        const [sr,sc]=occ[Math.floor(Math.random()*occ.length)].split(',').map(Number);
        const conn=findConn(sr,sc);
        if(!conn)continue;
        const backup={};for(const k in dbc)backup[k]=new Set(dbc[k]);
        for(let i=0;i<conn.length-1;i++){const[r,c]=conn[i],[nr,nc]=conn[i+1];
          const d=dirTo(r,c,nr,nc);link(r,c,d);link(nr,nc,(d+2)%4);}
        g=gridFromDirs(dbc);
        if(simulateCar(g,CARS[0])&&simulateCar(g,CARS[1])){added++;}
        else{for(const k in dbc)delete dbc[k];for(const k in backup)dbc[k]=backup[k];}
      }

      g=gridFromDirs(dbc);
      if(simulateCar(g,CARS[0])&&simulateCar(g,CARS[1])){
        for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)grid[r][c]=g[r][c];
        let inter=0;
        for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
          const t=grid[r][c];if(t&&(t.type==='tee'||t.type==='tee_l'||t.type==='cross'))inter++;
        }
        flash(`Circuit g\u00e9n\u00e9r\u00e9 (${inter} intersection${inter>1?'s':''}) \u2014 jouable ! \u25b6`,'win');
        draw();autosave();
        return;
      }
    }
    flash('G\u00e9n\u00e9ration difficile, r\u00e9essaie \ud83c\udfb2','fail');
  }
  function dirTo(r,c,nr,nc){
    if(nr<r)return 0; if(nr>r)return 2; if(nc>c)return 1; return 3;
  }

  document.getElementById('generate').onclick=generate;
  eraseBtn.onclick=()=>{eraseMode=!eraseMode;eraseBtn.style.outline=eraseMode?'2px solid var(--accent)':'';};
  document.getElementById('clear').onclick=()=>{if(running)return;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)grid[r][c]=null;
    flash('',null);draw();autosave();};

  function flash(t,cls){const m=document.getElementById('msg');m.textContent=t;m.className=cls||'';}

  const OPP={0:2,1:3,2:0,3:1},DR={0:-1,1:0,2:1,3:0},DC={0:0,1:1,2:0,3:-1};

  // --- Cadence : délai de base d'un pas, modulé par la vitesse ---
  const BASE_STEP=360;
  const stepDelay=()=>Math.round(BASE_STEP*speedMult);
  // wait() respecte la pause et le jeton de course (un STOP annule tous les wait en attente).
  function wait(factor, cb){
    const ms=Math.round(BASE_STEP*speedMult*factor);
    const myToken=raceToken;
    setTimeout(()=>{
      if(myToken!==raceToken) return;   // course annulée -> on ne fait rien
      if(paused){ resumeFn=cb; }
      else { cb(); }
    }, ms);
  }

  // Sélecteur de vitesse
  document.querySelectorAll('.speed-btn').forEach(b=>{
    b.onclick=()=>{
      speedMult=parseFloat(b.dataset.mult);
      document.querySelectorAll('.speed-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      updateCarSpeed();
    };
  });
  function updateCarSpeed(){
    // synchronise la transition CSS des voitures avec la vitesse courante
    const t=(stepDelay()/1000).toFixed(2);
    carEls.forEach(el=>{el.style.transition=`transform ${t}s linear`;});
  }

  // Bouton Pause / Reprendre
  const pauseBtn=document.getElementById('pause');
  pauseBtn.onclick=()=>{
    if(!running)return;
    paused=!paused;
    pauseBtn.textContent=paused?'▶ Reprendre':'⏸ Pause';
    flash(paused?'⏸ En pause':'Les voitures roulent…', paused?null:null);
    if(!paused && resumeFn){ const f=resumeFn; resumeFn=null; f(); }
  };

  // Bouton STOP : arrête tout, remet les voitures au départ et réinitialise l'affichage.
  const stopBtn=document.getElementById('stop');
  stopBtn.onclick=()=>{
    if(!running)return;
    raceToken++;              // annule tous les wait() en attente
    running=false;paused=false;resumeFn=null;
    pauseBtn.disabled=true;pauseBtn.textContent='⏸ Pause';
    stopBtn.disabled=true;
    // remet les voitures à leurs positions de départ
    const s=step1();
    carEls.forEach((el,i)=>{
      el.classList.remove('crashed');
      el.style.display='flex';
      const car=CARS[i];
      el.style.transition='transform .2s ease';
      el.style.transform=`translate(${car.start.c*s}px,${car.start.r*s}px)`;
      const body=el.querySelector('.body');
      body.style.transition='transform .2s ease';
      body.style.transform='';
    });
    clearBooms();
    draw();
    flash('⏹ Arrêté. Ajuste l\u2019ordre des sorties puis relance ▶','win');
  };

  document.getElementById('go').onclick=()=>{if(running)return;runRace();};

  const step1=()=>TS+1;
  // 🚗 pointe vers la gauche (Ouest) par défaut.
  const carTransform={3:'rotate(0deg)',0:'rotate(90deg)',1:'scaleX(-1)',2:'scaleX(-1) rotate(90deg)'};

  function clearBooms(){
    document.querySelectorAll('.boom, .debris').forEach(b=>b.remove());
    document.querySelectorAll('.cell.deadend-flash').forEach(c=>c.classList.remove('deadend-flash'));
  }

  // Petite alarme via Web Audio API : 2-3 bips selon la sévérité
  let audioCtx=null;
  function playAlarm(big){
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      const ctx=audioCtx;
      const beeps = big ? [{f:200,t:0},{f:150,t:0.18},{f:100,t:0.36},{f:80,t:0.55}]
                        : [{f:660,t:0},{f:440,t:0.15},{f:660,t:0.3}];
      beeps.forEach(b=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='square'; o.frequency.value=b.f;
        g.gain.value=0; o.connect(g); g.connect(ctx.destination);
        const t0=ctx.currentTime+b.t;
        g.gain.setValueAtTime(0,t0);
        g.gain.linearRampToValueAtTime(0.15,t0+0.01);
        g.gain.linearRampToValueAtTime(0,t0+0.12);
        o.start(t0); o.stop(t0+0.14);
      });
    }catch(e){}
  }

  function runRace(){
    running=true;paused=false;resumeFn=null;
    raceToken++;            // nouvelle course : invalide les wait en attente d'une précédente
    pauseBtn.disabled=false;pauseBtn.textContent='⏸ Pause';
    stopBtn.disabled=false;
    updateCarSpeed();
    flash('Les voitures roulent…',null);
    clearBooms();
    draw(); // repart d'un affichage propre (numéros dans l'ordre défini)
    const s=step1();
    // termine proprement la course (réactive les contrôles)
    function endRace(){ running=false; paused=false; resumeFn=null;
      pauseBtn.disabled=true; pauseBtn.textContent='⏸ Pause';
      stopBtn.disabled=true; }
    // pointeur de sortie partagé par case (croisements/T) : tourne à chaque passage,
    // toutes voitures confondues. Démarre sur la 1ère sortie de l'ordre défini.
    const xPointer={};

    // état de chaque voiture
    const state=CARS.map((car,i)=>{
      const el=carEls[i];
      el.classList.remove('crashed');
      const body=el.querySelector('.body');
      body.style.transform=carTransform[1]; // orientation neutre de départ
      el.style.display='flex';
      el.style.transform=`translate(${car.start.c*s}px,${car.start.r*s}px)`;
      return {car, el, body, r:car.start.r, c:car.start.c,
              cameFrom:-1, done:false, alive:true};
    });

    // vérifie que chaque départ a bien une route
    for(const st of state){
      if(!grid[st.r][st.c]){endRace();
        return flash(`Pose une route sur le départ A${st.car.id+1} !`,'fail');}
    }

    let steps=0; const MAX=ROWS*COLS*8;

    function tick(){
      // Plus de plafond global : si une voiture tourne en rond, elle tourne ;
      // la course se termine quand toutes les voitures sont arrivées ou éliminées.
      steps++;

      // 1) calcule le prochain mouvement de chaque voiture encore active
      const moves={};
      for(const st of state){
        if(st.done||!st.alive){moves[st.car.id]=null;continue;}
        moves[st.car.id]=computeNext(st);
        // si false, la voiture vient d'être éliminée (st.alive=false) ; on continue
      }

      // 2) détection de collision (uniquement entre voitures encore actives ET en mouvement)
      const active=state.filter(st=>st.alive&&!st.done&&moves[st.car.id]);
      if(active.length===2){
        const [a,b]=active;
        const ma=moves[a.car.id], mb=moves[b.car.id];
        const sameCell = ma.nr===mb.nr && ma.nc===mb.nc;
        const swap = ma.nr===b.r && ma.nc===b.c && mb.nr===a.r && mb.nc===a.c;
        if(sameCell||swap){
          // grosse collision -> fin du jeu pour les deux
          applyMove(a,ma);applyMove(b,mb);
          const cr=sameCell?ma.nr:Math.round((a.r+b.r)/2);
          const cc=sameCell?ma.nc:Math.round((a.c+b.c)/2);
          wait(1, ()=>crash(cr,cc,a,b));
          return;
        }
      }

      // 3) on applique les mouvements des voitures encore actives
      let anyMoved=false;
      for(const st of state){
        const m=moves[st.car.id];
        if(m && st.alive){applyMove(st,m);anyMoved=true;}
      }

      // 4) conditions de fin : toutes les voitures sont soit arrivées soit éliminées
      const allFinished=state.every(st=>st.done||!st.alive);
      if(allFinished){
        endRace();
        const arrived=state.filter(st=>st.done).length;
        const lost=state.filter(st=>!st.alive && !st.done).length;
        if(arrived===state.length) return flash('🏁 Bravo ! Les deux voitures sont arrivées !','win');
        if(arrived>0 && lost>0)    return flash(`🏁 ${arrived} voiture arrivée, ${lost} éliminée.`,'win');
        if(lost===state.length)    return flash('Aucune voiture n\u2019a atteint son arrivée.','fail');
        return;
      }
      if(!anyMoved){endRace();return;}
      wait(1, tick);
    }

    // calcule le prochain pas d'une voiture (sans l'appliquer)
    // Élimine UNE voiture sans arrêter la course de l'autre.
    // kind: 'explode' = explosion + débris ; 'deadend' = fond rouge + alarme
    function eliminate(st, kind, msg){
      st.alive=false;
      const sCell=cells[st.r] && cells[st.r][st.c];
      if(kind==='explode'){
        // animation d'explosion sur la voiture, puis débris persistants sur la case
        st.el.classList.add('crashed');
        const boom=document.createElement('div');boom.className='boom';boom.textContent='💥';
        boom.style.left=(st.c*s)+'px';boom.style.top=(st.r*s)+'px';
        board.appendChild(boom);
        if(navigator.vibrate)navigator.vibrate(600);   // vibration longue : sortie de route/explosion
        // après l'explosion, on cache la voiture et on pose un débris
        setTimeout(()=>{
          st.el.style.display='none';
          const debris=document.createElement('div');
          debris.className='debris';debris.textContent='🔥';
          debris.style.left=(st.c*s)+'px';debris.style.top=(st.r*s)+'px';
          board.appendChild(debris);
        },700);
      }else if(kind==='deadend'){
        // fond rouge clignotant + alarme + voiture s'arrête là
        if(sCell){sCell.classList.add('deadend-flash');}
        if(navigator.vibrate)navigator.vibrate(600);   // vibration longue : cul-de-sac
        playAlarm();
      }
      flash(`${kind==='explode'?'💥':'🚨'} ${st.car.name} : ${msg}`,'fail');
    }

    function computeNext(st){
      const cell=grid[st.r][st.c];
      if(!cell){eliminate(st,'explode','route cassée 🚧');return false;}
      if(st.r===st.car.end.r && st.c===st.car.end.c){st.done=true;return null;}

      // TUILE BOUCLE
      if(LOOP[cell.type]){
        const exit=openDirs(cell)[0];
        if(st.cameFrom!==exit && st.cameFrom!==-1){
          eliminate(st,'explode','boucle non raccordée 🔌');return false;
        }
        const nr=st.r+DR[exit], nc=st.c+DC[exit];
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS){
          eliminate(st,'explode','la boucle pointe hors plateau 🚧');return false;
        }
        const next=grid[nr][nc];
        if(!next||!openDirs(next).includes(OPP[exit])){
          eliminate(st,'explode','la boucle débouche dans le vide 🔌');return false;
        }
        return {d:exit, nr, nc, loop:true};
      }

      const back=st.cameFrom;
      const reachable=d=>{
        const nr=st.r+DR[d], nc=st.c+DC[d];
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return false;
        const next=grid[nr][nc];
        return !!next && openDirs(next).includes(OPP[d]);
      };

      // TUILE À ROUTAGE DÉTERMINISTE OU ALTERNANT (T, X)
      if(ROUTE[cell.type] && back!==-1){
        const relIn=(back - cell.rot + 4) % 4;
        let relOutSpec=ROUTE[cell.type][relIn];
        if(relOutSpec===undefined){
          eliminate(st,'explode','entrée par un côté fermé 🔌');return false;
        }
        let relOut;
        if(Array.isArray(relOutSpec)){
          const spec = cell.swap ? [relOutSpec[1], relOutSpec[0]] : relOutSpec;
          const k=st.r+','+st.c+'/'+relIn;
          const p=(xPointer[k]||0) % spec.length;
          relOut=spec[p];
          const newPtr=(p+1) % spec.length;
          xPointer[k]=newPtr;
          const cr=st.r, cc=st.c;
          if(navigator.vibrate)navigator.vibrate(15);   // vibration courte : changement de sortie T
          wait(0.5, ()=>redrawTeeWithPointer(cr,cc,relIn,newPtr));
        }else{
          relOut=relOutSpec;
        }
        const d=(relOut + cell.rot) % 4;
        if(!reachable(d)){
          const nr=st.r+DR[d],nc=st.c+DC[d];
          const off=(nr<0||nr>=ROWS||nc<0||nc>=COLS);
          eliminate(st,'explode', off?'route hors plateau 🚧':'routes non connectées 🔌');
          return false;
        }
        return {d, nr:st.r+DR[d], nc:st.c+DC[d]};
      }

      // Cas général
      const usable=openDirs(cell).filter(d=>d!==back && reachable(d));
      if(!usable.length){
        const offboard=openDirs(cell).filter(d=>d!==back).some(d=>{
          const nr=st.r+DR[d],nc=st.c+DC[d];
          return nr<0||nr>=ROWS||nc<0||nc>=COLS;
        });
        // Cul-de-sac : la tuile n'a pas d'issue valable (pas une erreur "technique")
        // -> fond rouge + alarme (sauf si c'est une sortie hors plateau pure)
        if(offboard){
          eliminate(st,'explode','route hors plateau 🚧');
        }else{
          eliminate(st,'deadend','cul-de-sac');
        }
        return false;
      }
      const d=usable[0];
      return {d, nr:st.r+DR[d], nc:st.c+DC[d]};
    }

    function applyMove(st,m){
      if(m.loop){
        // pirouette : la voiture tourne sur elle-même sur la case boucle, puis repart
        st.body.style.transition='transform .5s ease-in-out';
        st.body.style.transform=(carTransform[st.cameFrom]||'')+' rotate(360deg)';
      }else{
        st.body.style.transition='transform .3s ease';
        st.body.style.transform=carTransform[m.d]||st.body.style.transform;
      }
      st.r=m.nr;st.c=m.nc;st.cameFrom=OPP[m.d];
      st.el.style.transform=`translate(${st.c*s}px,${st.r*s}px)`;
      if(st.r===st.car.end.r && st.c===st.car.end.c) st.done=true;
    }

    function crash(cr,cc,a,b){
      endRace();
      a.el.classList.add('crashed');b.el.classList.add('crashed');
      // grosse explosion centrale
      const boom=document.createElement('div');boom.className='boom big';boom.textContent='💥';
      boom.style.left=(cc*s)+'px';boom.style.top=(cr*s)+'px';
      board.appendChild(boom);
      // débris persistants après l'explosion sur les deux véhicules
      setTimeout(()=>{
        [a,b].forEach(car=>{
          car.el.style.display='none';
          const debris=document.createElement('div');
          debris.className='debris';debris.textContent='🔥';
          debris.style.left=(car.c*s)+'px';debris.style.top=(car.r*s)+'px';
          board.appendChild(debris);
        });
      },700);
      if(navigator.vibrate)navigator.vibrate(900);   // vibration très longue : collision finale
      playAlarm(true);
      flash('💥 COLLISION ! Fin du jeu.','fail');
    }

    wait(0.85, tick);
  }

  window.addEventListener('resize',()=>{TS=setTileSize();draw();});
})();

// Enregistrement du service worker (active l'installation PWA et le hors-ligne)
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>console.warn('SW non enregistré:',err));
  });
}
</script>
